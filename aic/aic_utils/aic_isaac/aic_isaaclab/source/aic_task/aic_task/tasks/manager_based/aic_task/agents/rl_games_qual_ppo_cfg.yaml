# RL-Games PPO for AIC-Task-v0.

params:
  seed: 42

  env:
    clip_observations: 100.0
    clip_actions: 100.0

  algo:
    name: a2c_continuous

  model:
    name: continuous_a2c_logstd

  network:
    name: actor_critic
    separate: False
    space:
      continuous:
        mu_activation: None
        sigma_activation: None

        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0
        fixed_sigma: True
    mlp:
      units: [256, 128, 64]
      activation: elu
      d2rl: False

      initializer:
        name: default
      regularizer:
        name: None

  load_checkpoint: False
  load_path: ""

  config:
    name: aic_task
    env_name: rlgpu
    device: "cuda:0"
    device_name: "cuda:0"
    multi_gpu: False
    ppo: True
    mixed_precision: False
    normalize_input: True
    normalize_value: True
    value_bootstrap: True
    num_actors: -1
    reward_shaper:
      scale_value: 1.0
    normalize_advantage: True
    gamma: 0.99
    tau: 0.95
    learning_rate: 3.0e-4
    lr_schedule: adaptive
    schedule_type: legacy
    kl_threshold: 0.01
    score_to_win: 100000000
    max_epochs: 3000
    save_best_after: 200
    save_frequency: 200
    print_stats: True
    log_frequency: 10
    grad_norm: 1.0
    entropy_coef: 0.005
    truncate_grads: True
    e_clip: 0.2
    horizon_length: 48
    # Set to num_envs * horizon_length at runtime (e.g. 32 * 48 = 1536); must divide rollout size.
    minibatch_size: 1536
    mini_epochs: 5
    critic_coef: 1.0
    clip_value: True
    clip_actions: False
    bounds_loss_coef: 0.0001
